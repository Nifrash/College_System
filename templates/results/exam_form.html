{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}

<div class="mb-3">
    <a href="{% url 'exam_list' %}" class="btn btn-secondary">
        ← Back to Exams
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-header bg-white">
        <h4 class="mb-0">{{ page_title }}</h4>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Save Exam
            </button>

            <a href="{% url 'exam_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>

{% endblock %}
