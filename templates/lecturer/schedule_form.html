{% extends 'base.html' %}

{% block title %}Class Schedule{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white">
        <h4 class="mb-0">{{ page_title }}</h4>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">Save Schedule</button>
            <a href="{% url 'schedule_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
